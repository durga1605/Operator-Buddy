{% extends "layouts/index.html" %}
{% load static %}
{% block body %}
<link rel="stylesheet" href="{% static 'internal/css/wip/start_complete_process.css' %}">

<div class="container mt-4 wip-scan-page">
    <h4 class="mb-3">WIP Start/Complete Process</h4>

    {% if error %}
    <div class="alert alert-danger" role="alert">{{ error }}</div>
    {% endif %}

    <form id="wip-form" class="wip-scan-form" novalidate data-url-part="{% url 'scan_part_no' %}" data-url-operator="{% url 'scan_operator' %}" data-url-machine="{% url 'scan_machine' %}" data-url-work-order="{% url 'scan_work_order' %}" data-url-submit="{% url 'submit_production' %}">

        <div class="row mb-3">
            <div class="col-md-4">
                <label for="part_no" class="form-label fw-medium">Scan Part No</label>
                <input type="text" class="form-control wip-scan-input" id="part_no" name="part_no" placeholder="Scan Part No" autocomplete="off" autocapitalize="off" spellcheck="false" inputmode="none" data-scan-step="part" required autofocus>
            </div>
            <div class="col-md-4">
                <label for="operator_id" class="form-label fw-medium">Scan Operator ID</label>
                <input type="text" class="form-control wip-scan-input" id="operator_id" name="operator_id" placeholder="Scan Operator ID" autocomplete="off" autocapitalize="off" spellcheck="false" inputmode="none" data-scan-step="operator" disabled required>
            </div>
            <div class="col-md-4">
                <label for="machine_id" class="form-label fw-medium">Scan Machine ID</label>
                <input type="text" class="form-control wip-scan-input" id="machine_id" name="machine_id" placeholder="Scan Machine ID" autocomplete="off" autocapitalize="off" spellcheck="false" inputmode="none" data-scan-step="machine" disabled required>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-4">
                <label for="process_select" class="form-label fw-medium">Process</label>
                <select class="form-select" id="process_select" name="process_selected" disabled required>
                    <option value="">Select Process</option>
                </select>
            </div>
            <div class="col-md-4">
                <label for="work_order" class="form-label fw-medium">Scan Work Order</label>
                <input type="text" class="form-control wip-scan-input" id="work_order" name="work_order" placeholder="Scan Work Order" autocomplete="off" autocapitalize="off" spellcheck="false" inputmode="none" data-scan-step="work_order" disabled required>
            </div>
            <div class="col-md-4">
                <label class="form-label fw-medium" for="woqty">WO Quantity</label>
                <input type="text" class="form-control" id="woqty" name="woqty" readonly tabindex="-1">
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-6">
                <label for="production_count" class="form-label fw-medium">Production Count</label>
                <input type="number" class="form-control" id="production_count" name="production_count" placeholder="Enter Production Count" disabled min="0" inputmode="numeric">
            </div>
            <div class="col-md-6">
                <label for="rejected_count" class="form-label fw-medium">Rejection Count</label>
                <input type="number" class="form-control" id="rejected_count" name="rejected_count" placeholder="Enter Rejection Count" disabled min="0" inputmode="numeric">
            </div>
        </div>

        <div class="mb-3">
            <span id="timer" class="badge bg-primary fs-6">Timer: 00:00:00</span>
            <span id="wip-scan-status" class="badge bg-secondary ms-2 wip-scan-status" aria-live="polite"></span>
        </div>

        <button type="submit" class="btn btn-success" id="submit-btn" disabled>Submit to SAP</button>
    </form>
</div>

<script src="{% static 'internal/js/wip/start_complete_process.js' %}" defer></script>
{% endblock %}
