{% extends "layouts/index.html" %}
{% load static %}
{% block body %}
<link rel="stylesheet" href="{% static 'internal/css/wip/start_complete_process.css' %}">

<div class="wip-scan-page">
    <header class="wip-scan-header">
        <h1 class="wip-scan-title">WIP Process</h1>
        <p class="wip-scan-sub">Scan work order first</p>
    </header>

    {% if error %}
    <div class="alert alert-danger wip-alert" role="alert">{{ error }}</div>
    {% endif %}

    <form id="wip-form" class="wip-scan-form" novalidate data-url-work-order="{% url 'scan_work_order' %}" data-url-operator="{% url 'scan_operator' %}" data-url-validate="{% url 'validate_machine_process' %}" data-url-submit="{% url 'submit_production' %}">
        {% csrf_token %}

        <section class="wip-card">
            <label for="work_order" class="wip-label">Scan Work Order</label>
            <input type="text" class="form-control form-control-lg wip-scan-input" id="work_order" name="work_order" placeholder="Scan work order" autocomplete="off" autocapitalize="off" spellcheck="false" inputmode="none" autofocus required>

            <div class="wip-info-grid d-none" id="wo-info-panel">
                <div>
                    <span class="wip-info-label">Material / Part</span>
                    <strong id="display_part_no" class="wip-info-value">—</strong>
                </div>
                <div>
                    <span class="wip-info-label">WO Quantity</span>
                    <strong id="display_woqty" class="wip-info-value">—</strong>
                </div>
            </div>
        </section>

        <section class="wip-card wip-card--disabled" id="step-operator">
            <label for="operator_id" class="wip-label">Scan Operator ID</label>
            <input type="text" class="form-control form-control-lg wip-scan-input" id="operator_id" name="operator_id" placeholder="Scan operator" autocomplete="off" autocapitalize="off" spellcheck="false" inputmode="none" disabled required>
        </section>

        <section class="wip-card wip-card--disabled" id="step-machine">
            <label for="machine_id" class="wip-label">Scan Machine ID</label>
            <input type="text" class="form-control form-control-lg wip-scan-input" id="machine_id" name="machine_id" placeholder="Scan machine" autocomplete="off" autocapitalize="off" spellcheck="false" inputmode="none" disabled required>

            <label for="process_select" class="wip-label mt-3">Select Process</label>
            <select class="form-select form-select-lg" id="process_select" name="process_selected" disabled required>
                <option value="">Select process from SAP</option>
            </select>
        </section>

        <section class="wip-card wip-card--disabled" id="step-production">
            <div class="wip-timer-row">
                <span id="timer" class="wip-timer">00:00:00</span>
                <span id="wip-scan-status" class="wip-scan-status" aria-live="polite"></span>
            </div>

            <button type="button" class="btn btn-primary btn-lg w-100 wip-start-btn" id="start-btn" disabled>
                <i class="bi bi-play-fill" aria-hidden="true"></i> Start
            </button>

            <div class="wip-count-grid mt-3">
                <div>
                    <label for="production_count" class="wip-label">Production Count</label>
                    <input type="number" class="form-control form-control-lg" id="production_count" name="production_count" placeholder="0" disabled min="0" inputmode="numeric">
                </div>
                <div>
                    <label for="rejected_count" class="wip-label">Rejection Count</label>
                    <input type="number" class="form-control form-control-lg" id="rejected_count" name="rejected_count" placeholder="0" disabled min="0" inputmode="numeric">
                </div>
            </div>
        </section>

        <button type="submit" class="btn btn-success btn-lg w-100 wip-submit-btn" id="submit-btn" disabled>
            Submit to SAP
        </button>
    </form>
</div>

<script src="{% static 'internal/js/wip/start_complete_process.js' %}" defer></script>
{% endblock %}
